<!DOCTYPE html>
<html>

<head>
    <title>Create assembly batch</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h2>Create assembly batch:</h2>
        {% if message %}
        <p>{{ message }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('new_batch') }}">
            <label>Batch name</label>
            <input type="text" name="name" required>
            <label>Date</label>
            <input type="text" name="date" placeholder="YYYY-MM-DD" required>
            <label>Number of boards</label>
            <input type="number" name="count" required>
            <button type="submit">Create new batch</button>
        </form>
        <a href="{{ url_for('menu') }}">Return to Menu</a>
    </div>
</body>

</html>
