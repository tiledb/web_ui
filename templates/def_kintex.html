<!DOCTYPE html>
<html>

<head>
    <title>Define daughterboard Kintex ID</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <div class="container">
        <h2>Define daughterboard Kintex ID</h2>
        {% if message %}
        <p>{{ message }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('def_kintex') }}">
            <label>Daughterboard serial number</label>
            <input type="text" name="serial" required>
            <label>Kintex ID</label>
            <input type="text" name="kintex_id" required>
            <button type="submit">Save</button>
        </form>
        <a href="{{ url_for('menu') }}">Return to Menu</a>
    </div>
</body>

</html>
